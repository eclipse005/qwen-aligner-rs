[package]
name = "qwen-aligner-rs"
version = "0.1.0"
edition = "2021"
description = "Qwen3 forced aligner in Rust — word-level alignment using Burn backend (CUDA)"

[[bin]]
name = "qwen-aligner"
path = "src/main.rs"

[features]
default = ["cuda"]
cuda = ["burn/cuda", "dep:burn-cubecl", "dep:cubecl", "cubecl/cuda", "dep:cudarc"]

[dependencies]
burn = { version = "0.21", default-features = false, features = ["std"] }
burn-cubecl = { version = "0.21", optional = true }
cubecl = { version = "0.10", optional = true }
cudarc = { version = "0.19.7", features = ["cublas", "f16", "nvrtc"], optional = true }
half = "2"
tokenizers = { version = "0.22", features = ["onig"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hound = "3"
rustfft = "6"
anyhow = "1"
safetensors = "0.4"
clap = { version = "4", features = ["derive"] }
lindera = { version = "3.0.7", default-features = false, features = ["embed-ipadic"] }
log = "0.4"
env_logger = "0.11"
